services:
  - type: web
    name: psychmonitor-frontend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BACKEND_BASE_URL
        value: http://144.31.203.220:8000
      # Токен задаётся вручную в дашборде Render (секрет, не хранится в репозитории)
      - key: BACKEND_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.7
